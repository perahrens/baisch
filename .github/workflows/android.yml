name: Build Android APK

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: |
          mkdir -p "$ANDROID_HOME/licenses"
          printf '\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n' > "$ANDROID_HOME/licenses/android-sdk-license"
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd\n' >> "$ANDROID_HOME/licenses/android-sdk-license"
          printf '\nd975f751698a77b662f1254ddbeed3901e976f5a\n' > "$ANDROID_HOME/licenses/android-sdk-build-tools-license"

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          ./gradlew android:assembleDebug 2>&1 | tee /tmp/build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo '## Gradle build output (last 150 lines)' >> $GITHUB_STEP_SUMMARY
          tail -150 /tmp/build.log >> $GITHUB_STEP_SUMMARY
          exit $BUILD_EXIT

      - name: Post build log to PR
        if: failure() && github.event_name == 'pull_request'
        run: |
          BODY=$(tail -100 /tmp/build.log | sed "s/\`/'/g")
          gh pr comment ${{ github.event.pull_request.number }} --body "### Android Build Log (last 100 lines)\n\n\`\`\`\n${BODY}\n\`\`\`"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: baisch-debug-${{ github.sha }}
          path: android/build/outputs/apk/debug/android-debug.apk
          retention-days: 30
