name: Build iOS IPA

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: macos-13
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.robovm/cache
          key: gradle-ios-${{ hashFiles('**/*.gradle', 'gradle.properties') }}
          restore-keys: gradle-ios-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build iOS IPA
        run: ./gradlew ios:createIPA

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: baisch-ios-${{ github.sha }}
          path: ios/build/**/*.ipa
          retention-days: 30
