// Force gwt-user 2.8.2 — gdx-backend-gwt:1.9.8 pulls in gwt-user:2.8.0 which lacks
// the no-arg RegexFilter() constructor that gwt-dev-2.8.2's WhitelistRegexFilter needs.
configurations.all {
    resolutionStrategy.force 'com.google.gwt:gwt-user:2.8.2'
}

gwt {
    gwtVersion='2.8.2' // 2.8.2 fixes Java 9+ compatibility (URLClassLoader, JreIndex)
    maxHeapSize="1G" // Default 256m is not enough for gwt compiler. GWT is HUNGRY
    minHeapSize="1G"

    src = files(file("src/")) // Needs to be in front of "modules" below.
    modules 'com.mygdx.game.GdxDefinition'
    devModules 'com.mygdx.game.GdxDefinitionSuperdev'
    project.webAppDirName = 'webapp'

    compiler {
        strict = true;
        disableCastChecking = true;
    }
}

// Required for GWT 2.8.x on Java 9+
// jvmArgs field is declared in AbstractGwtActionTask (grandparent of concrete tasks)
afterEvaluate {
    def extraJvmArgs = ['--add-opens', 'java.base/java.lang=ALL-UNNAMED',
                        '--add-opens', 'java.base/java.lang.reflect=ALL-UNNAMED',
                        '--add-opens', 'java.base/java.io=ALL-UNNAMED',
                        '--add-opens', 'java.base/java.util=ALL-UNNAMED',
                        '--add-opens', 'java.base/sun.net.www.protocol.jar=ALL-UNNAMED',
                        '--add-opens', 'java.base/jdk.internal.loader=ALL-UNNAMED']
    tasks.matching { it instanceof org.wisepersist.gradle.plugins.gwt.AbstractGwtTask }.each { t ->
        try {
            def jvmArgsField = org.wisepersist.gradle.plugins.gwt.AbstractGwtActionTask.class.getDeclaredField('jvmArgs')
            jvmArgsField.setAccessible(true)
            List existing = (List) jvmArgsField.get(t)
            if (existing == null) {
                jvmArgsField.set(t, new ArrayList(extraJvmArgs))
            } else {
                existing.addAll(extraJvmArgs)
            }
            println "Set jvmArgs on ${t.name}"
        } catch (Exception e) {
            println "Warning: could not configure ${t.name}: ${e.class.simpleName}: ${e.message}"
        }
    }
}

import org.wisepersist.gradle.plugins.gwt.GwtSuperDev

def HttpFileServer server = null
def httpFilePort = 8080

task startHttpServer () {
    dependsOn draftCompileGwt

    String output = project.buildDir.path + "/gwt/draftOut"

    doLast {
        copy {
            from "webapp"
            into output
        }

        copy {
            from "war"
            into output
        }

        server = new SimpleHttpFileServerFactory().start(new File(output), httpFilePort)

        println "Server started in directory " + server.getContentRoot() + ", http://localhost:" + server.getPort()
    }
}

task superDev (type: GwtSuperDev) {
    dependsOn startHttpServer
    doFirst {
        gwt.modules = gwt.devModules
    }
}


task dist(dependsOn: [clean, compileGwt]) {
    doLast {
        file("build/dist").mkdirs()
        copy {
            from "build/gwt/out"
            into "build/dist"
        }
        copy {
            from "webapp"
            into "build/dist"
            }
        copy {
            from "war"
            into "build/dist"
        }
    }
}

task addSource {
    doLast {
        sourceSets.main.compileClasspath += files(project(':core').sourceSets.main.allJava.srcDirs)
    }
}

tasks.compileGwt.dependsOn(addSource)
tasks.draftCompileGwt.dependsOn(addSource)

sourceCompatibility = 1.6
sourceSets.main.java.srcDirs = [ "src/" ]


eclipse.project {
    name = appName + "-html"
}
