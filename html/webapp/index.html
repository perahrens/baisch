<!doctype html>
<html>
       <head>
              <title>Baisch-v1</title>
              <meta http-equiv="content-type" content="text/html; charset=UTF-8">
              <!-- width=device-width: browser uses its natural CSS viewport width so
                   tablets and desktops get their actual dimensions. The Java FitViewport
                   letterbox centres the 450×800 logical game area with black bars. -->
              <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
              <meta name="apple-mobile-web-app-capable" content="yes">
              <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
              <meta name="mobile-web-app-capable" content="yes">
              <link href="styles.css" rel="stylesheet" type="text/css">
              <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
              <script src="soundmanager2-setup.js"></script>
  			  <script src="soundmanager2-jsmin.js"></script>
              <style>
                html {
                  height: 100%;
                  overflow: hidden;
                }
                body {
                  margin: 0;
                  padding: 0;
                  position: fixed;
                  width: 100%;
                  height: 100%;
                  overflow: hidden;
                }
                #embed-html {
                  width: 100%;
                  height: 100%;
                  text-align: center;
                  display: flex;
                  justify-content: center;
                  align-items: flex-start;
                }
                /* Keep the GWT SuperDev button accessible in dev mode but
                   remove it from the document flow so it doesn't push the
                   canvas down and cause a touch/click Y-offset. */
                .superdev {
                  position: fixed;
                  bottom: 10px;
                  right: 10px;
                  z-index: 9999;
                }
                /* ── Hide the default libGDX preloader logo/progress bar ─── */
                /* The GWT backend injects a wrapper <table> then .gdx-preloader */
                /* inside #embed-html. Our custom overlay handles this phase.   */
                .gdx-preloader { display: none !important; }
                #embed-html > table { display: none !important; }
                /* ── Game-branded loading overlay ─────────────────────────── */
                #loading-overlay {
                  position: fixed;
                  inset: 0;
                  background: #1a1a2e;
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                  justify-content: center;
                  z-index: 8000;
                  transition: opacity 0.4s ease;
                }
                #loading-overlay.fade-out {
                  opacity: 0;
                  pointer-events: none;
                }
                #loading-title {
                  font-family: Georgia, 'Times New Roman', serif;
                  font-size: clamp(48px, 12vw, 96px);
                  font-weight: bold;
                  letter-spacing: 0.15em;
                  color: #f5c842;
                  text-shadow: 0 0 30px rgba(245,200,66,0.6), 0 2px 8px rgba(0,0,0,0.8);
                  margin-bottom: 20px;
                  animation: pulse 2s ease-in-out infinite;
                }
                #loading-suits {
                  font-size: clamp(24px, 6vw, 42px);
                  letter-spacing: 0.3em;
                  color: #cccccc;
                  margin-bottom: 40px;
                }
                #loading-suits .red { color: #e05555; }
                #loading-bar-wrap {
                  width: clamp(160px, 40vw, 260px);
                  height: 6px;
                  background: rgba(255,255,255,0.15);
                  border-radius: 3px;
                  overflow: hidden;
                }
                #loading-bar {
                  height: 100%;
                  width: 30%;
                  background: linear-gradient(90deg, #f5c842, #e0a020);
                  border-radius: 3px;
                  animation: slide 1.4s ease-in-out infinite;
                }
                @keyframes pulse {
                  0%, 100% { opacity: 1; }
                  50%       { opacity: 0.75; }
                }
                @keyframes slide {
                  0%   { transform: translateX(-120%); }
                  100% { transform: translateX(500%); }
                }
              </style>
       </head>

       <body>
              <!-- Game-branded loading screen, removed once the canvas appears -->
              <div id="loading-overlay">
                <div id="loading-title">BAISCH</div>
                <div id="loading-suits">♠ <span class="red">♥</span> <span class="red">♦</span> ♣</div>
                <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
              </div>
              <a class="superdev" href="javascript:%7B%20window.__gwt_bookmarklet_params%20%3D%20%7B'server_url'%3A'http%3A%2F%2Flocalhost%3A9876%2F'%7D%3B%20var%20s%20%3D%20document.createElement('script')%3B%20s.src%20%3D%20'http%3A%2F%2Flocalhost%3A9876%2Fdev_mode_on.js'%3B%20void(document.getElementsByTagName('head')%5B0%5D.appendChild(s))%3B%7D">&#8635;</a>
              <div id="embed-html"></div>
              <script type="text/javascript" src="html/html.nocache.js"></script>
       </body>

       <script>
              // Prevent libGDX's global keydown handler from swallowing backspace
              // when the user is typing inside a native text input (getTextInput overlay).
              // useCapture=true ensures this runs before libGDX's bubbling-phase listener.
              document.addEventListener('keydown', function(e) {
                if (e.keyCode === 8) { // Backspace
                  var el = document.activeElement;
                  if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) {
                    e.stopImmediatePropagation();
                  }
                }
              }, true);

              function handleMouseDown(evt) {
                evt.preventDefault();
                evt.stopPropagation();
                evt.target.style.cursor = 'default';
                window.focus();
              }

              function handleMouseUp(evt) {
                evt.preventDefault();
                evt.stopPropagation();
                evt.target.style.cursor = '';
              }
              document.getElementById('embed-html').addEventListener('mousedown', handleMouseDown, false);
              document.getElementById('embed-html').addEventListener('mouseup', handleMouseUp, false);

              // Remove the loading overlay once GWT creates the canvas
              (function() {
                var overlay = document.getElementById('loading-overlay');
                if (!overlay) return;
                var observer = new MutationObserver(function() {
                  if (document.querySelector('#embed-html canvas')) {
                    observer.disconnect();
                    overlay.classList.add('fade-out');
                    setTimeout(function() {
                      if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
                    }, 450);
                  }
                });
                observer.observe(document.getElementById('embed-html'), { childList: true, subtree: true });
              })();
       </script>
</html>
       </script>
