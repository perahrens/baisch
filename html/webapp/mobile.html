<!doctype html>
<html>
  <head>
    <title>Baisch</title>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <!-- Use device width so JS can scale the canvas to fit both dimensions. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link href="styles.css" rel="stylesheet" type="text/css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
    <script src="soundmanager2-setup.js"></script>
    <script src="soundmanager2-jsmin.js"></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #222222;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #embed-html {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="embed-html"></div>
    <script type="text/javascript" src="html/html.nocache.js"></script>
    <script>
      // Prevent page scroll on the document level. Events on the canvas are
      // handled separately (and stopped before bubbling) by fitGameCanvas().
      document.addEventListener('touchmove', function(e) {
        e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchstart', function(e) {
        if (e.touches.length > 1) {
          e.preventDefault();
        }
      }, { passive: false });

      var GAME_W = 450, GAME_H = 800;

      function fitGameCanvas() {
        var embedDiv = document.getElementById('embed-html');
        var canvas = embedDiv.querySelector('canvas');
        if (!canvas) {
          setTimeout(fitGameCanvas, 200);
          return;
        }

        var scale = Math.min(window.innerWidth / GAME_W, window.innerHeight / GAME_H);
        canvas.style.display = 'block';
        canvas.style.transformOrigin = '0 0';
        canvas.style.transform = 'scale(' + scale + ')';
        embedDiv.style.width  = Math.round(GAME_W * scale) + 'px';
        embedDiv.style.height = Math.round(GAME_H * scale) + 'px';

        // Fix touch coordinates.
        //
        // CSS transform scales the canvas visually but LibGDX's GWT input
        // handler reads raw  clientX - canvas.offsetLeft  which yields a
        // value in [0, 450*scale] instead of the expected [0, 450].  Touches
        // near the bottom or right therefore land in the wrong game position.
        //
        // Solution: intercept touch events in the capture phase (before they
        // reach GWT), divide by the scale factor to get true game-space coords,
        // then re-dispatch a MouseEvent at the corrected position.  With
        // transformOrigin=0,0 the canvas layout corner equals its visual corner
        // so rect.left/top from getBoundingClientRect() is the correct base.
        if (!canvas._touchInputFixed) {
          canvas._touchInputFixed = true;

          function dispatchCorrectedMouse(type, touch) {
            var rect = canvas.getBoundingClientRect(); // transform-aware
            var gx = (touch.clientX - rect.left) * GAME_W / rect.width;
            var gy = (touch.clientY - rect.top)  * GAME_H / rect.height;
            canvas.dispatchEvent(new MouseEvent(type, {
              bubbles: true,
              cancelable: true,
              view: window,
              clientX: rect.left + gx,
              clientY: rect.top  + gy
            }));
          }

          canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            e.stopPropagation();
            dispatchCorrectedMouse('mousedown', e.changedTouches[0]);
          }, { passive: false, capture: true });

          canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            e.stopPropagation();
            dispatchCorrectedMouse('mousemove', e.changedTouches[0]);
          }, { passive: false, capture: true });

          canvas.addEventListener('touchend', function(e) {
            e.preventDefault();
            e.stopPropagation();
            dispatchCorrectedMouse('mouseup', e.changedTouches[0]);
          }, { passive: false, capture: true });
        }
      }

      window.addEventListener('resize', fitGameCanvas);
      fitGameCanvas();
    </script>
  </body>
</html>
