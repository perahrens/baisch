<!doctype html>
<html>
  <head>
    <title>Baisch</title>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <!-- Use device width so JS can scale the canvas to fit both dimensions. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link href="styles.css" rel="stylesheet" type="text/css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
    <script src="soundmanager2-setup.js"></script>
    <script src="soundmanager2-jsmin.js"></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #222222;
      }
      /*
       * Use position:fixed (not absolute) so the element is relative to the
       * visual viewport, exactly like clientX/clientY in touch events.
       * !important prevents LibGDX's GWT RootPanel from overriding these with
       * inline styles, which would shift the canvas away from (0,0) and break
       * every touch coordinate calculation.
       * Left-aligned (no centering): black strip appears at the right/bottom
       * on very wide screens, but the game content is never cut off.
       */
      #embed-html {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
      }
    </style>
  </head>
  <body>
    <div id="embed-html"></div>
    <script type="text/javascript" src="html/html.nocache.js"></script>
    <script>
      // Prevent page scroll.
      document.addEventListener('touchmove', function(e) {
        e.preventDefault();
      }, { passive: false });

      var GAME_W = 450, GAME_H = 800;

      function fitGameCanvas() {
        var embedDiv = document.getElementById('embed-html');
        var canvas = embedDiv.querySelector('canvas');
        if (!canvas) {
          setTimeout(fitGameCanvas, 200);
          return;
        }

        // Scale canvas visually to fit the screen.
        //
        // CSS width/height (not transform) is used so that the browser reports
        // the scaled size via offsetWidth/offsetHeight.  LibGDX reads those to
        // compute xRatio = logicalWidth / offsetWidth (e.g. 450/390 = 1.154)
        // and applies it to every touch coordinate automatically.
        //
        // The canvas is locked to (0,0) via CSS !important above, so
        // absoluteLeft = absoluteTop = 0 and clientX/Y from touch events map
        // directly to canvas-relative CSS pixels with no manual remapping.
        var scale = Math.min(window.innerWidth / GAME_W, window.innerHeight / GAME_H);
        var cssW = Math.round(GAME_W * scale);
        var cssH = Math.round(GAME_H * scale);
        canvas.style.display = 'block';
        canvas.style.width   = cssW + 'px';
        canvas.style.height  = cssH + 'px';
        embedDiv.style.width  = cssW + 'px';
        embedDiv.style.height = cssH + 'px';

        // Forward touch events as mouse events.  No coordinate adjustment
        // needed because the canvas is always at viewport (0,0).
        if (!canvas._touchInputFixed) {
          canvas._touchInputFixed = true;

          function forwardTouch(type, touch) {
            canvas.dispatchEvent(new MouseEvent(type, {
              bubbles: true,
              cancelable: true,
              view: window,
              clientX: touch.clientX,
              clientY: touch.clientY
            }));
          }

          canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            e.stopPropagation();
            forwardTouch('mousedown', e.changedTouches[0]);
          }, { passive: false, capture: true });

          canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            e.stopPropagation();
            forwardTouch('mousemove', e.changedTouches[0]);
          }, { passive: false, capture: true });

          canvas.addEventListener('touchend', function(e) {
            e.preventDefault();
            e.stopPropagation();
            forwardTouch('mouseup', e.changedTouches[0]);
          }, { passive: false, capture: true });
        }
      }

      window.addEventListener('resize', fitGameCanvas);
      fitGameCanvas();
            e.preventDefault();
            e.stopPropagation();
            forwardTouch('mousedown', e.changedTouches[0]);
          }, { passive: false, capture: true });

          canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            e.stopPropagation();
            forwardTouch('mousemove', e.changedTouches[0]);
          }, { passive: false, capture: true });

          canvas.addEventListener('touchend', function(e) {
            e.preventDefault();
            e.stopPropagation();
            forwardTouch('mouseup', e.changedTouches[0]);
          }, { passive: false, capture: true });
        }
      }

      window.addEventListener('resize', fitGameCanvas);
      fitGameCanvas();
    </script>
  </body>
</html>
