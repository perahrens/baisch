<!doctype html>
<html>
  <head>
    <title>Baisch</title>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <!-- Use device width so JS can scale the canvas to fit both dimensions. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link href="styles.css" rel="stylesheet" type="text/css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
    <script src="soundmanager2-setup.js"></script>
    <script src="soundmanager2-jsmin.js"></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #222222;
      }
      /* Positioned absolutely so offsetTop=0 and getAbsoluteTop()=0.
         Flexbox vertical centering would add an offset to offsetTop that
         differs from the touch clientY origin (bottom of URL bar), causing
         a systematic Y-axis coordinate error in LibGDX's input handler. */
      #embed-html {
        position: absolute;
        top: 0;
      }
    </style>
  </head>
  <body>
    <div id="embed-html"></div>
    <script type="text/javascript" src="html/html.nocache.js"></script>
    <script>
      // Prevent page scroll on the document level. Events on the canvas are
      // handled separately (and stopped before bubbling) by fitGameCanvas().
      document.addEventListener('touchmove', function(e) {
        e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchstart', function(e) {
        if (e.touches.length > 1) {
          e.preventDefault();
        }
      }, { passive: false });

      var GAME_W = 450, GAME_H = 800;

      function fitGameCanvas() {
        var embedDiv = document.getElementById('embed-html');
        var canvas = embedDiv.querySelector('canvas');
        if (!canvas) {
          setTimeout(fitGameCanvas, 200);
          return;
        }

        // Scale using CSS width/height, NOT transform: scale().
        //
        // CSS transform does not affect offsetWidth/offsetHeight, so LibGDX's
        // built-in ratio (logicalWidth / offsetWidth) stays at 1:1 and does
        // not correct for the visual scale → wrong touch coords.
        //
        // With CSS width/height the browser reports the CSS pixel size via
        // offsetWidth/offsetHeight, so LibGDX computes the right scale ratio
        // (e.g. 450/390 = 1.15) and maps touches correctly without any manual
        // coordinate remapping on our side.
        var scale = Math.min(window.innerWidth / GAME_W, window.innerHeight / GAME_H);
        var cssW = Math.round(GAME_W * scale);
        var cssH = Math.round(GAME_H * scale);
        canvas.style.display = 'block';
        canvas.style.width  = cssW + 'px';
        canvas.style.height = cssH + 'px';
        embedDiv.style.width  = cssW + 'px';
        embedDiv.style.height = cssH + 'px';
        // Center horizontally; anchor to top so absoluteTop=0 and
        // clientY from touch events maps directly to game Y coordinates.
        embedDiv.style.left = Math.round((window.innerWidth - cssW) / 2) + 'px';
        embedDiv.style.top  = '0';

        // Forward touch events as mouse events.  No coordinate remapping
        // needed: LibGDX reads clientX/clientY and subtracts the canvas's
        // absoluteLeft/Top, then applies its own offsetWidth ratio, which now
        // correctly converts CSS pixels to game pixels.
        if (!canvas._touchInputFixed) {
          canvas._touchInputFixed = true;

          function forwardTouch(type, touch) {
            canvas.dispatchEvent(new MouseEvent(type, {
              bubbles: true,
              cancelable: true,
              view: window,
              clientX: touch.clientX,
              clientY: touch.clientY
            }));
          }

          canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            e.stopPropagation();
            forwardTouch('mousedown', e.changedTouches[0]);
          }, { passive: false, capture: true });

          canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            e.stopPropagation();
            forwardTouch('mousemove', e.changedTouches[0]);
          }, { passive: false, capture: true });

          canvas.addEventListener('touchend', function(e) {
            e.preventDefault();
            e.stopPropagation();
            forwardTouch('mouseup', e.changedTouches[0]);
          }, { passive: false, capture: true });
        }
      }

      window.addEventListener('resize', fitGameCanvas);
      fitGameCanvas();
    </script>
  </body>
</html>
