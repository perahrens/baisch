<!doctype html>
<html>
  <head>
    <title>Baisch</title>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <!-- Use device width so JS can scale the canvas to fit both dimensions. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link href="styles.css" rel="stylesheet" type="text/css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
    <script src="soundmanager2-setup.js"></script>
    <script src="soundmanager2-jsmin.js"></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #222222;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #embed-html {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="embed-html"></div>
    <script type="text/javascript" src="html/html.nocache.js"></script>
    <script>
      // Prevent page scroll and pinch-zoom from interfering with the game.
      document.addEventListener('touchmove', function(e) {
        e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchstart', function(e) {
        if (e.touches.length > 1) {
          e.preventDefault();
        }
      }, { passive: false });

      // Pass mouse events into the game canvas as before.
      function handleMouseDown(evt) {
        evt.preventDefault();
        evt.stopPropagation();
        evt.target.style.cursor = 'default';
        window.focus();
      }

      function handleMouseUp(evt) {
        evt.preventDefault();
        evt.stopPropagation();
        evt.target.style.cursor = '';
      }

      document.getElementById('embed-html').addEventListener('mousedown', handleMouseDown, false);
      document.getElementById('embed-html').addEventListener('mouseup', handleMouseUp, false);

      // Scale the GWT canvas so it fits both the screen width AND height.
      // LibGDX creates the canvas inside #embed-html after GWT bootstraps, so
      // we poll until it appears and then resize on every orientation change.
      var GAME_W = 450, GAME_H = 800;

      function fitGameCanvas() {
        var embedDiv = document.getElementById('embed-html');
        var canvas = embedDiv.querySelector('canvas');
        if (!canvas) {
          setTimeout(fitGameCanvas, 200);
          return;
        }
        var scale = Math.min(window.innerWidth / GAME_W, window.innerHeight / GAME_H);
        canvas.style.display = 'block';
        canvas.style.transformOrigin = '0 0';
        canvas.style.transform = 'scale(' + scale + ')';
        embedDiv.style.width  = Math.round(GAME_W * scale) + 'px';
        embedDiv.style.height = Math.round(GAME_H * scale) + 'px';
      }

      window.addEventListener('resize', fitGameCanvas);
      fitGameCanvas();
    </script>
  </body>
</html>
