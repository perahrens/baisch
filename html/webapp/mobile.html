<!doctype html>
<html>
  <head>
    <title>Baisch</title>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <!-- Use device width so JS can scale the canvas to fit both dimensions. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link href="styles.css" rel="stylesheet" type="text/css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
    <script src="soundmanager2-setup.js"></script>
    <script src="soundmanager2-jsmin.js"></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #222222;
      }
      /*
       * position:fixed keeps the container in the visual viewport.
       * !important on top/left prevents LibGDX's GWT RootPanel from
       * overriding those with inline styles.
       * We do NOT constrain width/height — LibGDX sets those freely.
       * Overflow must be visible so the scaled canvas is not clipped.
       */
      #embed-html {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: visible !important;
      }
    </style>
  </head>
  <body>
    <div id="embed-html"></div>
    <script type="text/javascript" src="html/html.nocache.js"></script>
    <script>
      // Prevent page scroll.
      document.addEventListener('touchmove', function(e) {
        e.preventDefault();
      }, { passive: false });

      var GAME_W = 450, GAME_H = 800;
      var currentScale = 1;

      function fitGameCanvas() {
        var embedDiv = document.getElementById('embed-html');
        var canvas = embedDiv.querySelector('canvas');
        if (!canvas) {
          setTimeout(fitGameCanvas, 200);
          return;
        }

        // Scale the canvas visually using transform: scale() only.
        //
        // We deliberately do NOT set canvas.style.width/height because
        // LibGDX's GWT backend sets those to '450px'/'800px' as inline styles
        // after every resize, overriding anything we write there.
        //
        // With transform, offsetWidth/offsetHeight stay at 450/800, so
        // LibGDX computes a 1:1 input ratio.  We compensate by dividing
        // touch coordinates by the scale before forwarding them (see below).
        currentScale = Math.min(window.innerWidth / GAME_W, window.innerHeight / GAME_H);
        canvas.style.transformOrigin = '0 0';
        canvas.style.transform = 'scale(' + currentScale + ')';
        canvas.style.display = 'block';

        if (!canvas._touchInputFixed) {
          canvas._touchInputFixed = true;

          function forwardTouch(type, touch) {
            // The canvas is at viewport (0,0) and LibGDX uses a 1:1 ratio
            // (offsetWidth=450, logicalWidth=450), so gameX = clientX exactly.
            // Dividing by currentScale converts from screen CSS pixels to the
            // canvas's unscaled 450×800 coordinate space.
            canvas.dispatchEvent(new MouseEvent(type, {
              bubbles: true,
              cancelable: true,
              view: window,
              clientX: touch.clientX / currentScale,
              clientY: touch.clientY / currentScale
            }));
          }

          canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            e.stopPropagation();
            forwardTouch('mousedown', e.changedTouches[0]);
          }, { passive: false, capture: true });

          canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            e.stopPropagation();
            forwardTouch('mousemove', e.changedTouches[0]);
          }, { passive: false, capture: true });

          canvas.addEventListener('touchend', function(e) {
            e.preventDefault();
            e.stopPropagation();
            forwardTouch('mouseup', e.changedTouches[0]);
          }, { passive: false, capture: true });
        }
      }

      window.addEventListener('resize', fitGameCanvas);
      fitGameCanvas();
            e.preventDefault();
            e.stopPropagation();
            forwardTouch('mousedown', e.changedTouches[0]);
          }, { passive: false, capture: true });

          canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            e.stopPropagation();
            forwardTouch('mousemove', e.changedTouches[0]);
          }, { passive: false, capture: true });

          canvas.addEventListener('touchend', function(e) {
            e.preventDefault();
            e.stopPropagation();
            forwardTouch('mouseup', e.changedTouches[0]);
          }, { passive: false, capture: true });
        }
      }

      window.addEventListener('resize', fitGameCanvas);
      fitGameCanvas();
    </script>
  </body>
</html>
