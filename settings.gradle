include 'desktop', 'core', 'html'

// Include the Android module only when its build.gradle is present.
// The Fly.io Docker build doesn't copy the android/ directory, so this
// guard prevents the GWT/web build from failing on CI/CD.
if (new File(rootDir, 'android/build.gradle').exists()) {
    include 'android'
}

// Include the iOS module only when its build.gradle is present.
if (new File(rootDir, 'ios/build.gradle').exists()) {
    include 'ios'
}